<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>네이버 스타일 한 페이지</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #1e2a38;
        --muted: #6b7a8f;
        --accent: #03c75a;
        --accent-dark: #00b34a;
        --border: #e7edf5;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
        background: linear-gradient(180deg, #eef4fb 0%, var(--bg) 100%);
        color: var(--text);
      }

      .page {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px 60px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }

      .brand {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .brand .green { color: var(--accent); }

      .menu {
        display: flex;
        gap: 14px;
        color: var(--muted);
        font-size: 14px;
      }

      .hero {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 30px 32px;
        box-shadow: 0 10px 30px rgba(19, 37, 60, 0.06);
      }

      .hero-title {
        font-size: 28px;
        margin: 0 0 10px;
        font-weight: 700;
      }

      .hero-subtitle {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 15px;
      }

      .search-box {
        display: flex;
        align-items: center;
        border: 2px solid var(--accent);
        border-radius: 999px;
        padding: 12px 16px;
        gap: 10px;
        max-width: 760px;
      }

      .search-box input {
        border: none;
        outline: none;
        flex: 1;
        font-size: 16px;
        background: transparent;
      }

      .search-btn {
        border: none;
        background: var(--accent);
        color: white;
        padding: 10px 16px;
        border-radius: 999px;
        font-weight: 700;
        cursor: pointer;
      }

      .search-btn:hover { background: var(--accent-dark); }

      .quick-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .pill {
        background: #f6f9fc;
        color: var(--text);
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 13px;
        border: 1px solid var(--border);
      }

      .grid {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 20px;
        margin-top: 22px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(19, 37, 60, 0.04);
      }

      .panel h3 {
        margin: 0 0 14px;
        font-size: 18px;
      }

      .news-list {
        display: grid;
        gap: 12px;
      }

      .news-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 10px;
        border-bottom: 1px solid #f0f4f8;
      }

      .news-item:last-child { border-bottom: none; padding-bottom: 0; }

      .news-item strong { font-size: 14px; }
      .news-item span { color: var(--muted); font-size: 13px; }

      .weather {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 6px;
      }

      .weather .temp {
        font-size: 32px;
        font-weight: 800;
      }

      .weather .meta { color: var(--muted); font-size: 14px; }

      .cards {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 14px;
        background: #fbfdff;
      }

      .card strong { display: block; margin-bottom: 4px; }
      .card span { color: var(--muted); font-size: 13px; }

      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <div class="brand">NAVER<span class="green">.</span></div>
        <div class="menu">
          <span>뉴스</span>
          <span>쇼핑</span>
          <span>지도</span>
          <span>메일</span>
        </div>
      </div>

      <section class="hero">
        <h1 class="hero-title">오늘의 정보가 한눈에 보이는 페이지</h1>
        <p class="hero-subtitle">검색하고, 확인하고, 바로 이어서 사용해보세요.</p>

        <div class="search-box">
          <span>🔎</span>
          <input type="text" placeholder="검색어를 입력하세요" />
          <button class="search-btn">검색</button>
        </div>

        <div class="quick-links">
          <span class="pill">#실시간뉴스</span>
          <span class="pill">#날씨</span>
          <span class="pill">#쇼핑추천</span>
          <span class="pill">#지도</span>
        </div>
      </section>

      <div class="grid">
        <section class="panel">
          <h3>실시간 뉴스</h3>
          <div class="news-list">
            <div class="news-item">
              <strong>AI가 바꾸는 일상 서비스</strong>
              <span>12분 전</span>
            </div>
            <div class="news-item">
              <strong>여름철 여행지 추천</strong>
              <span>28분 전</span>
            </div>
            <div class="news-item">
              <strong>새로운 음악 플랫폼 출시</strong>
              <span>52분 전</span>
            </div>
          </div>
        </section>

        <section class="panel">
          <h3>오늘의 날씨</h3>
          <div class="weather">
            <div>
              <div class="temp">28°</div>
              <div class="meta">서울 · 구름 조금</div>
            </div>
            <div>☀️</div>
          </div>

          <div class="cards">
            <div class="card">
              <strong>추천 일정</strong>
              <span>오후엔 카페에서 여유로운 시간을 보내보세요.</span>
            </div>
            <div class="card">
              <strong>쇼핑 추천</strong>
              <span>가볍게 입기 좋은 여름 아이템을 확인해보세요.</span>
            </div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
